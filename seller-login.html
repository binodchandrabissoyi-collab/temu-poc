<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Registration - Temu Seller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
  .container { background: #ffffff; padding: 40px 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 450px; text-align: center; border: 1px solid #e6e6e6; }
  .logo { font-size: 28px; font-weight: 700; color: #ff4646; margin-bottom: 5px; letter-spacing: -0.5px; }
  .logo span { color: #222; }
  .sub { color: #666; font-size: 14px; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
  .input-group { text-align: left; margin-bottom: 12px; }
  .input-group label { font-size: 13px; font-weight: 600; color: #333; display: block; margin-bottom: 4px; }
  .input-group input { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; transition: 0.2s; }
  .input-group input:focus { border-color: #ff4646; outline: none; box-shadow: 0 0 0 3px rgba(255,70,70,0.1); }
  .btn { background: #ff4646; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 5px; }
  .btn:hover { background: #e03535; }
  .alert-box { background: #fff3cd; color: #856404; padding: 10px; border-radius: 4px; margin-top: 15px; font-size: 13px; border: 1px solid #ffeeba; display: none; }
  .note { margin-top: 15px; font-size: 11px; color: #999; }
  .row { display: flex; gap: 10px; }
  .row .input-group { flex: 1; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">Temu <span>Seller</span></div>
  <div class="sub">Complete your seller registration</div>

  <!-- 🔥 PII (Personal Identifiable Information) CAPTURE FORM -->
  <form onsubmit="return captureAll(event)">
    <div class="row">
      <div class="input-group">
        <label>First Name</label>
        <input type="text" id="fname" placeholder="John" required>
      </div>
      <div class="input-group">
        <label>Last Name</label>
        <input type="text" id="lname" placeholder="Doe" required>
      </div>
    </div>

    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="seller@example.com" required>
    </div>

    <div class="input-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+1 234 567 8900" required>
    </div>

    <div class="input-group">
      <label>Business / Residential Address</label>
      <input type="text" id="address" placeholder="123 Main St, City, State, ZIP" required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a strong password" required>
    </div>

    <div class="input-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="Confirm your password" required>
    </div>

    <button type="submit" class="btn">Create Account</button>
  </form>

  <div id="alertBox" class="alert-box">⚠️ All PII data captured! (Check Console)</div>
  <div class="note">🔐 This is a simulated phishing page for security demonstration.</div>
</div>

<script>
function captureAll(e) {
    e.preventDefault();

    // Sabhi fields capture karo
    var data = {
        "First Name": document.getElementById('fname').value,
        "Last Name": document.getElementById('lname').value,
        "Email": document.getElementById('email').value,
        "Phone": document.getElementById('phone').value,
        "Address": document.getElementById('address').value,
        "Password": document.getElementById('password').value,
        "Confirm Password": document.getElementById('confirm').value
    };

    // Page par alert box show karo
    document.getElementById('alertBox').style.display = 'block';

    // Console me full details print karo (Screenshot ke liye)
    console.log('🛑 FULL PII CAPTURED (Identity Theft Risk):');
    console.table(data);
    
    // Alert box me summary dikhao
    alert('🔥 FULL PII CAPTURED!\n\n' + 
          'Name: ' + data['First Name'] + ' ' + data['Last Name'] + '\n' +
          'Email: ' + data['Email'] + '\n' +
          'Phone: ' + data['Phone'] + '\n' +
          'Address: ' + data['Address'] + '\n' +
          'Password: ' + data['Password'] + '\n\n' +
          'Check Console for full details.');

    return false;
}
</script>
</body>
</html>
